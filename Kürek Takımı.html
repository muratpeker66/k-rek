<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title> Mavi Vatan Kalesi Antenman Takip</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#040d1a;font-family:'Courier New',monospace;color:#00cfff;height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* HEADER */
header{
  background:rgba(0,20,50,0.95);
  border-bottom:1px solid rgba(0,180,255,0.2);
  padding:8px 12px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  z-index:1000;
}
.header-title{font-size:16px;letter-spacing:3px;text-shadow:0 0 12px #00cfff;}
.header-status{display:flex;align-items:center;gap:6px;font-size:12px;}
.status-dot{width:10px;height:10px;border-radius:50%;background:#334;}
.status-dot.active{background:#00ff88;box-shadow:0 0 8px #00ff88;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}

/* HARİTA */
#map{flex:1;z-index:1;}

/* STATS PANEL */
.stats-panel{
  background:rgba(0,10,30,0.97);
  border-top:1px solid rgba(0,180,255,0.2);
  padding:10px 12px;
  z-index:1000;
}
.stats-row{display:flex;gap:8px;margin-bottom:8px;}
.stat-box{
  flex:1;
  background:rgba(0,40,80,0.6);
  border:1px solid rgba(0,180,255,0.2);
  border-radius:10px;
  padding:8px 6px;
  text-align:center;
}
.stat-label{font-size:9px;color:#446;letter-spacing:1px;margin-bottom:2px;text-transform:uppercase;}
.stat-value{font-size:20px;color:#00cfff;text-shadow:0 0 10px #00cfff;font-weight:bold;line-height:1;}
.stat-unit{font-size:9px;color:#557;margin-top:2px;}

/* BUTONLAR */
.btn-row{display:flex;gap:8px;}
.btn{
  flex:1;
  padding:14px 8px;
  border:none;
  border-radius:12px;
  font-family:'Courier New',monospace;
  font-size:14px;
  font-weight:bold;
  letter-spacing:1px;
  cursor:pointer;
  transition:all 0.2s;
}
.btn-start{background:linear-gradient(135deg,#00aa44,#00ff88);color:#001a0a;box-shadow:0 0 20px rgba(0,255,136,0.3);}
.btn-stop{background:linear-gradient(135deg,#aa2200,#ff4422);color:#fff;box-shadow:0 0 20px rgba(255,68,34,0.3);}
.btn-reset{background:rgba(0,40,80,0.8);border:1px solid rgba(0,180,255,0.3);color:#00cfff;}
.btn-history{background:rgba(40,0,80,0.8);border:1px solid rgba(180,0,255,0.3);color:#cc88ff;}
.btn:active{transform:scale(0.96);}
.btn:disabled{opacity:0.4;}

/* GPS UYARI */
.gps-info{
  text-align:center;
  font-size:11px;
  color:#446;
  margin-top:6px;
  letter-spacing:1px;
}

/* GEÇMİŞ MODAL */
.modal{
  display:none;
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.85);
  z-index:9999;
  flex-direction:column;
}
.modal.open{display:flex;}
.modal-inner{
  background:#040d1a;
  border:1px solid rgba(0,180,255,0.2);
  border-radius:16px;
  margin:20px;
  flex:1;
  overflow-y:auto;
  padding:16px;
}
.modal-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:16px;
  padding-bottom:10px;
  border-bottom:1px solid rgba(0,180,255,0.15);
}
.modal-title{font-size:16px;letter-spacing:2px;color:#00cfff;text-shadow:0 0 10px #00cfff;}
.modal-close{
  background:rgba(255,0,0,0.15);
  border:1px solid rgba(255,0,0,0.3);
  color:#ff4444;
  padding:6px 14px;
  border-radius:8px;
  cursor:pointer;
  font-family:'Courier New',monospace;
  font-size:13px;
}
.history-item{
  background:rgba(0,40,80,0.4);
  border:1px solid rgba(0,180,255,0.15);
  border-radius:10px;
  padding:12px;
  margin-bottom:10px;
}
.history-date{font-size:11px;color:#446;margin-bottom:6px;letter-spacing:1px;}
.history-stats{display:flex;gap:8px;flex-wrap:wrap;}
.history-stat{
  background:rgba(0,20,50,0.8);
  border-radius:6px;
  padding:4px 10px;
  font-size:12px;
}
.history-stat span{color:#00cfff;}
.history-empty{text-align:center;color:#334;font-size:14px;padding:40px 0;letter-spacing:2px;}
.btn-del{
  background:rgba(255,0,0,0.1);
  border:1px solid rgba(255,0,0,0.2);
  color:#ff4444;
  padding:4px 10px;
  border-radius:6px;
  cursor:pointer;
  font-size:11px;
  font-family:'Courier New',monospace;
  margin-top:8px;
}

/* HIZI VURGULA */
.stat-value.fast{color:#ffdd00;text-shadow:0 0 10px #ffdd00;}
.stat-value.slow{color:#00cfff;}
.btn-finish{
  background:linear-gradient(135deg,#0066cc,#00ccff);
  color:#fff;
  box-shadow:0 0 20px rgba(0,180,255,0.3);
  flex:2;
}
</style>
</head>
<body>

<header>
  <div class="header-title">🚣 KÜREK TAKİP</div>
  <div class="header-status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText" style="color:#334;">HAZIR</span>
  </div>
</header>

<div id="map"></div>

<div class="stats-panel">
  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-label">HIZ</div>
      <div class="stat-value" id="statSpeed">0.0</div>
      <div class="stat-unit">km/h</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">MESAFE</div>
      <div class="stat-value" id="statDist">0.00</div>
      <div class="stat-unit">km</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">SÜRE</div>
      <div class="stat-value" id="statTime" style="font-size:16px;padding-top:4px;">00:00</div>
      <div class="stat-unit">dk:sn</div>
    </div>
  </div>
  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-label">MAX HIZ</div>
      <div class="stat-value" id="statMaxSpeed" style="font-size:16px;">0.0</div>
      <div class="stat-unit">km/h</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">ORT HIZ</div>
      <div class="stat-value" id="statAvgSpeed" style="font-size:16px;">0.0</div>
      <div class="stat-unit">km/h</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">KALORİ</div>
      <div class="stat-value" id="statCal" style="font-size:16px;">0</div>
      <div class="stat-unit">kcal</div>
    </div>
  </div>
<div class="btn-row">
  <button class="btn btn-start"   id="btnStart"  onclick="startTracking()">▶ BAŞLAT</button>
  <button class="btn btn-stop"    id="btnStop"   onclick="pauseTracking()" disabled>⏸ DURAKLAT</button>
  <button class="btn btn-history" onclick="openHistory()">📋</button>
</div>
<div class="btn-row" style="margin-top:6px;">
  <button class="btn btn-finish"  id="btnFinish" onclick="finishTracking()" disabled>🏁 BİTİR & KAYDET</button>
  <button class="btn btn-reset"   id="btnReset"  onclick="resetTracking()">↺ SIFIRLA</button>
</div>
  <div class="gps-info" id="gpsInfo">📡 GPS bekleniyor...</div>
</div>

<!-- GEÇMİŞ MODAL -->
<div class="modal" id="historyModal">
  <div class="modal-inner">
    <div class="modal-header">
      <div class="modal-title">📋 ANTRENMAN GEÇMİŞİ</div>
      <button class="modal-close" onclick="closeHistory()">✕ KAPAT</button>
    </div>
    <div id="historyList"></div>
  </div>
</div>

<script>
// =====================
// HARİTA BAŞLAT
// =====================
const map = L.map('map', {
  zoomControl: true,
  attributionControl: false
}).setView([41.0082, 28.9784], 14);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  maxZoom: 19,
}).addTo(map);

// Özel marker
const boatIcon = L.divIcon({
  html: '<div style="font-size:28px;filter:drop-shadow(0 0 6px #00cfff);">🚣</div>',
  iconSize: [32,32],
  iconAnchor: [16,16],
  className: ''
});

let boatMarker = null;
let routePolyline = L.polyline([], {
  color: '#00cfff',
  weight: 4,
  opacity: 0.85
}).addTo(map);

// =====================
// DEĞİŞKENLER
// =====================
let isTracking = false;
let watchId = null;
let routePoints = [];
let totalDistance = 0;
let maxSpeed = 0;
let speedSum = 0;
let speedCount = 0;
let startTime = null;
let timerInterval = null;
let elapsedSeconds = 0;
let lastPos = null;

// =====================
// GPS BAŞLAT
// =====================
function startTracking(){
  if(!navigator.geolocation){
    alert('Tarayıcınız GPS desteklemiyor!');
    return;
  }

  isTracking = true;
  startTime = Date.now() - elapsedSeconds*1000;

  document.getElementById('btnStart').disabled = true;
  document.getElementById('btnStop').disabled = false;
  document.getElementById('statusDot').classList.add('active');
  document.getElementById('statusText').style.color = '#00ff88';
  document.getElementById('statusText').textContent = 'KAYIT';

  // Kronometre
  timerInterval = setInterval(updateTimer, 1000);

  // GPS izle
  watchId = navigator.geolocation.watchPosition(
    onPosition,
    onGpsError,
    {
      enableHighAccuracy: true,
      maximumAge: 1000,
      timeout: 10000
    }
  );
}

function pauseTracking(){
  isTracking = false;
  if(watchId) navigator.geolocation.clearWatch(watchId);
  if(timerInterval) clearInterval(timerInterval);

  document.getElementById('btnStart').disabled = false;
  document.getElementById('btnStart').textContent = '▶ DEVAM';
  document.getElementById('btnStop').disabled = true;
  document.getElementById('btnFinish').disabled = false;
  document.getElementById('statusDot').classList.remove('active');
  document.getElementById('statusText').style.color = '#ffdd00';
  document.getElementById('statusText').textContent = 'DURAKLATILDI';
  document.getElementById('statSpeed').textContent = '0.0';
}

function finishTracking(){
  pauseTracking();
  if(routePoints.length > 2){
    saveSession();
    document.getElementById('statusText').textContent = 'KAYDEDİLDİ ✓';
    document.getElementById('statusText').style.color = '#00ff88';
    document.getElementById('gpsInfo').textContent = '✅ Antrenman kaydedildi! 📋 butonundan görebilirsin.';
    document.getElementById('btnFinish').disabled = true;
  } else {
    document.getElementById('gpsInfo').textContent = '⚠️ Rota çok kısa, kaydedilmedi!';
  }
}

function resetTracking(){
  stopTracking();
  isTracking = false;
  routePoints = [];
  totalDistance = 0;
  maxSpeed = 0;
  speedSum = 0;
  speedCount = 0;
  elapsedSeconds = 0;
  lastPos = null;
  startTime = null;

  routePolyline.setLatLngs([]);
  if(boatMarker){ map.removeLayer(boatMarker); boatMarker=null; }

  document.getElementById('statSpeed').textContent = '0.0';
  document.getElementById('statDist').textContent = '0.00';
  document.getElementById('statTime').textContent = '00:00';
  document.getElementById('statMaxSpeed').textContent = '0.0';
  document.getElementById('statAvgSpeed').textContent = '0.0';
  document.getElementById('statCal').textContent = '0';
  document.getElementById('statusDot').classList.remove('active');
  document.getElementById('statusText').style.color = '#334';
  document.getElementById('statusText').textContent = 'HAZIR';
  document.getElementById('gpsInfo').textContent = '📡 GPS bekleniyor...';
  document.getElementById('btnStart').disabled = false;
  document.getElementById('btnStop').disabled = true;
}

// =====================
// GPS KONUM
// =====================
function onPosition(pos){
  const lat = pos.coords.latitude;
  const lng = pos.coords.longitude;
  const acc = pos.coords.accuracy;
  const speedMs = pos.coords.speed || 0;
  const speedKmh = speedMs * 3.6;

  document.getElementById('gpsInfo').textContent =
    `📡 GPS: ±${Math.round(acc)}m  |  ${lat.toFixed(5)}, ${lng.toFixed(5)}`;

  // Marker güncelle
  if(!boatMarker){
    boatMarker = L.marker([lat,lng], {icon: boatIcon}).addTo(map);
    map.setView([lat,lng], 16);
  } else {
    boatMarker.setLatLng([lat,lng]);
  }

  if(!isTracking) return;

  // Rota ekle
  routePoints.push([lat,lng]);
  routePolyline.setLatLngs(routePoints);

  // Mesafe hesapla
  if(lastPos){
    const d = haversine(lastPos[0], lastPos[1], lat, lng);
    totalDistance += d;
  }
  lastPos = [lat, lng];

  // Hız
  if(speedKmh > maxSpeed) maxSpeed = speedKmh;
  if(speedKmh > 0){ speedSum += speedKmh; speedCount++; }
  const avgSpeed = speedCount > 0 ? speedSum/speedCount : 0;

  // Kalori (kürek: ~400 kcal/saat)
  const hours = elapsedSeconds / 3600;
  const calories = Math.round(400 * hours);

  // UI güncelle
  document.getElementById('statSpeed').textContent = speedKmh.toFixed(1);
  document.getElementById('statDist').textContent = totalDistance.toFixed(2);
  document.getElementById('statMaxSpeed').textContent = maxSpeed.toFixed(1);
  document.getElementById('statAvgSpeed').textContent = avgSpeed.toFixed(1);
  document.getElementById('statCal').textContent = calories;

  // Hız rengi
  const sv = document.getElementById('statSpeed');
  if(speedKmh > 6) sv.classList.add('fast');
  else sv.classList.remove('fast');

  // Haritayı takip et
  map.panTo([lat,lng]);
}

function onGpsError(err){
  document.getElementById('gpsInfo').textContent = '⚠️ GPS hatası: ' + err.message;
}

// =====================
// KRONOMETRe
// =====================
function updateTimer(){
  elapsedSeconds = Math.floor((Date.now() - startTime) / 1000);
  const m = Math.floor(elapsedSeconds/60).toString().padStart(2,'0');
  const s = (elapsedSeconds%60).toString().padStart(2,'0');
  document.getElementById('statTime').textContent = m+':'+s;
}

// =====================
// HAVERSINE FORMÜLÜ
// =====================
function haversine(lat1,lon1,lat2,lon2){
  const R = 6371;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 +
            Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// =====================
// KAYDET / GEÇMİŞ
// =====================
function saveSession(){
  const avgSpeed = speedCount>0 ? speedSum/speedCount : 0;
  const hours = elapsedSeconds/3600;
  const calories = Math.round(400*hours);

  const session = {
    date: new Date().toLocaleString('tr-TR'),
    distance: totalDistance.toFixed(2),
    duration: document.getElementById('statTime').textContent,
    maxSpeed: maxSpeed.toFixed(1),
    avgSpeed: avgSpeed.toFixed(1),
    calories: calories,
    points: routePoints
  };

  let history = JSON.parse(localStorage.getItem('kurek_history')||'[]');
  history.unshift(session);
  if(history.length > 20) history = history.slice(0,20);
  localStorage.setItem('kurek_history', JSON.stringify(history));
}

function openHistory(){
  const modal = document.getElementById('historyModal');
  modal.classList.add('open');
  renderHistory();
}

function closeHistory(){
  document.getElementById('historyModal').classList.remove('open');
}

function renderHistory(){
  const list = document.getElementById('historyList');
  const history = JSON.parse(localStorage.getItem('kurek_history')||'[]');
  if(history.length===0){
    list.innerHTML='<div class="history-empty">📭 Henüz antrenman yok!</div>';
    return;
  }
  list.innerHTML = history.map((s,i)=>`
    <div class="history-item">
      <div class="history-date">📅 ${s.date}</div>
      <div class="history-stats">
        <div class="history-stat">📏 <span>${s.distance}</span> km</div>
        <div class="history-stat">⏱ <span>${s.duration}</span></div>
        <div class="history-stat">🚀 <span>${s.maxSpeed}</span> km/h max</div>
        <div class="history-stat">📊 <span>${s.avgSpeed}</span> km/h ort</div>
        <div class="history-stat">🔥 <span>${s.calories}</span> kcal</div>
      </div>
      <button class="btn-del" onclick="deleteSession(${i})">🗑 SİL</button>
    </div>
  `).join('');
}

function deleteSession(i){
  let history = JSON.parse(localStorage.getItem('kurek_history')||'[]');
  history.splice(i,1);
  localStorage.setItem('kurek_history', JSON.stringify(history));
  renderHistory();
}

// =====================
// SAYFA YÜKLENİNCE GPS KONUMU AL
// =====================
window.onload = function(){
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(
      pos => {
        map.setView([pos.coords.latitude, pos.coords.longitude], 15);
        boatMarker = L.marker(
          [pos.coords.latitude, pos.coords.longitude],
          {icon: boatIcon}
        ).addTo(map);
        document.getElementById('gpsInfo').textContent =
          `📡 GPS hazır: ${pos.coords.latitude.toFixed(4)}, ${pos.coords.longitude.toFixed(4)}`;
      },
      err => {
        document.getElementById('gpsInfo').textContent = '⚠️ Konum izni gerekli!';
      },
      {enableHighAccuracy:true}
    );
  }
};
</script>
</body>
</html>
